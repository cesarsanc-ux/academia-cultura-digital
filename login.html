<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Admin — Cultura Digital CECyTE</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --guinda: #611232;
      --guinda-dark: #3e0b20;
      --guinda-light: #8b1a45;
      --dorado: #A57F2C;
      --dorado-light: #c9a44a;
      --dorado-pale: #f5ead0;
      --blanco: #ffffff;
      --gris-claro: #f7f4f0;
      --gris-medio: #e8e2d9;
      --texto: #1a1a1a;
      --texto-suave: #5a5a5a;
      --error: #c0392b;
      --exito: #15803d;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Open Sans', sans-serif;
      color: var(--texto);
      background: linear-gradient(135deg, var(--guinda-dark) 0%, var(--guinda) 50%, var(--guinda-light) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .login-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      max-width: 900px;
      width: 90%;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* LEFT SIDE - BRANDING */
    .login-brand {
      background: linear-gradient(135deg, var(--guinda-dark) 0%, var(--guinda) 100%);
      padding: 3rem 2rem;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .login-brand::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 80% 40%, rgba(165,127,44,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 80% at 10% 80%, rgba(97,18,50,0.5) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand-content {
      position: relative;
      z-index: 1;
    }

    .brand-icon {
      width: 80px;
      height: 80px;
      background: var(--dorado);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
    }

    .brand-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }

    .brand-subtitle {
      font-size: 0.9rem;
      opacity: 0.8;
      line-height: 1.6;
    }

    .brand-feature {
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.2);
      font-size: 0.85rem;
    }

    .brand-feature strong { color: var(--dorado-light); }

    /* RIGHT SIDE - FORM */
    .login-form-section {
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-header {
      margin-bottom: 2rem;
    }

    .form-header h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--guinda);
      margin-bottom: 0.5rem;
    }

    .form-header p {
      color: var(--texto-suave);
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--guinda);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid var(--gris-medio);
      border-radius: 8px;
      font-family: 'Open Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--texto);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--dorado);
      box-shadow: 0 0 0 3px rgba(165,127,44,0.1);
    }

    input::placeholder {
      color: var(--texto-suave);
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--texto-suave);
      margin-bottom: 1.5rem;
    }

    .remember-me input[type="checkbox"] {
      width: auto;
      border: none;
      cursor: pointer;
    }

    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: var(--dorado);
      color: var(--guinda-dark);
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-login:hover {
      background: var(--dorado-light);
      transform: translateY(-2px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      background: var(--gris-medio);
      color: var(--texto-suave);
      cursor: not-allowed;
      transform: none;
    }

    /* ALERTS */
    .alert {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: none;
      font-weight: 500;
      font-size: 0.9rem;
      animation: slideDown 0.3s ease;
    }

    .alert.show { display: block; }
    .alert.error {
      background: #fee2e2;
      color: var(--error);
      border-left: 4px solid var(--error);
    }

    .alert.exito {
      background: #d1fae5;
      color: var(--exito);
      border-left: 4px solid var(--exito);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--texto-suave);
    }

    .form-footer a {
      color: var(--dorado);
      text-decoration: none;
      font-weight: 600;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    /* RESPONSIVE */
    @media (max-width: 700px) {
      .login-container {
        grid-template-columns: 1fr;
      }

      .login-brand {
        padding: 2rem;
        order: 2;
      }

      .login-form-section {
        padding: 2rem;
        order: 1;
      }

      .login-brand {
        display: none;
      }
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--guinda);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="login-container">
  <!-- LEFT: Branding -->
  <div class="login-brand">
    <div class="brand-content">
      <div class="brand-icon">🔐</div>
      <h1 class="brand-title">Acceso Administrativo</h1>
      <p class="brand-subtitle">
        Centro de administración para el Área de Cultura Digital del CECyTE Tlaxcala
      </p>
      <div class="brand-feature">
        <strong>Acceso solo para:</strong><br>
        Coordinadores y administradores del área
      </div>
    </div>
  </div>

  <!-- RIGHT: Login Form -->
  <div class="login-form-section">
    <div class="form-header">
      <h2>Bienvenido</h2>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <div class="alert" id="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          placeholder="admin"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="remember-me">
        <input type="checkbox" id="remember" />
        <label for="remember" style="margin: 0; text-transform: none; letter-spacing: normal;">
          Recuérdame en este navegador
        </label>
      </div>

      <button type="submit" class="btn-login" id="submitBtn">
        Acceder
      </button>
    </form>

    <div class="form-footer">
      <p>¿Problemas para acceder?</p>
      <p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7;">
        Contacta con: <strong>culturadigital@cecytes.edu.mx</strong>
      </p>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // Recuperar parámetro de redirección
  function getRedirectURL() {
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect');
    return redirect || 'admin-noticias.html';
  }

  // Verificar si ya está autenticado
  document.addEventListener('DOMContentLoaded', () => {
    if (isAuthenticated()) {
      window.location.href = getRedirectURL();
    }
  });

  // Manejar envío de formulario
  async function handleLogin(event) {
    event.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    const submitBtn = document.getElementById('submitBtn');
    const alert = document.getElementById('alert');

    // Mostrar loading
    const originalText = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="loading-spinner"></span> Verificando...';

    try {
      // Validar credenciales
      validateCredentials(username, password);

      // Crear sesión
      const session = createSession(username);

      // Guardar preferencia de "recuérdame"
      if (remember) {
        localStorage.setItem('rememberMe', 'true');
      }

      // Mostrar éxito
      showAlert('✓ Acceso concedido. Redirigiendo...', 'exito');

      // Redirigir después de 1 segundo
      setTimeout(() => {
        window.location.href = getRedirectURL();
      }, 1000);

    } catch (error) {
      showAlert(error.message, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
      document.getElementById('password').value = '';
    }
  }

  // Mostrar alertas
  function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = `alert ${type} show`;

    if (type === 'error') {
      setTimeout(() => alert.classList.remove('show'), 4000);
    }
  }

  // Permitir Enter para enviar
  document.getElementById('loginForm').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      document.getElementById('submitBtn').click();
    }
  });

  // Pre-llenar usuario si hay "recuérdame"
  if (localStorage.getItem('rememberMe') === 'true') {
    document.getElementById('username').value = 'admin';
    document.getElementById('remember').checked = true;
    document.getElementById('password').focus();
  }
</script>

</body>
</html>
