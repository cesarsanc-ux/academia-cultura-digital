<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Administrativo — Cultura Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #1f4f25;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .login-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1f4f25;
      margin-bottom: 0.4rem;
    }
    .login-subtitle {
      font-size: 0.85rem;
      color: #5a5a5a;
      margin-bottom: 2rem;
    }
    .alert {
      padding: 0.85rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      display: none;
    }
    .alert.show { display: block; }
    .alert.error { background: #fee2e2; color: #c0392b; border-left: 4px solid #c0392b; }
    .alert.info  { background: #dbeafe; color: #2563eb; border-left: 4px solid #2563eb; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: #fff;
      border: 2px solid #e8e2d9;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a1a;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1rem;
    }
    .btn-google:hover {
      border-color: #1f4f25;
      box-shadow: 0 4px 12px rgba(31,79,37,0.15);
    }
    .btn-google:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .google-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: #aaa;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e2d9;
    }
    .form-group { margin-bottom: 1rem; text-align: left; }
    .form-group label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: #1f4f25;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1px solid #e8e2d9;
      border-radius: 8px;
      font-family: 'Open Sans', sans-serif;
      font-size: 0.9rem;
      color: #1a1a1a;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #1f4f25;
    }
    .btn-primary {
      width: 100%;
      padding: 0.85rem;
      background: #1f4f25;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #3f7f4d; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .back-link {
      display: block;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: #5a5a5a;
      text-decoration: none;
    }
    .back-link:hover { color: #1f4f25; }
    .loading { display: none; }
    .loading.show { display: inline-block; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">🏛️</div>
  <div class="login-title">Acceso Administrativo</div>
  <div class="login-subtitle">Área de Cultura Digital — CECyTE</div>

  <div class="alert" id="alert"></div>

  <!-- Google Sign-In -->
  <button class="btn-google" id="googleBtn" onclick="loginWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Iniciar sesión con Google
  </button>

  <a href="index.html" class="back-link">← Volver al sitio público</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script>
  // Correos autorizados para acceder al panel de administración
  const ALLOWED_EMAILS = [
    'cesar.sanchezcoyotzi@cecytlax.edu.mx'
    // Agrega aquí más correos autorizados si es necesario
  ];

  auth.onAuthStateChanged(user => {
    if (user) {
      if (ALLOWED_EMAILS.includes(user.email)) {
        window.location.href = 'admin-noticias.html';
      } else {
        auth.signOut();
        showAlert('Acceso denegado. Tu cuenta de Google no tiene permisos para esta área.', 'error');
        document.getElementById('googleBtn').disabled = false;
        document.getElementById('googleBtn').innerHTML = GOOGLE_BTN_HTML;
      }
    }
  });

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
  }

  const GOOGLE_BTN_HTML = `<svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
  </svg> Iniciar sesión con Google`;

  async function loginWithGoogle() {
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.textContent = 'Conectando...';
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      await auth.signInWithPopup(provider);
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') {
        showAlert('Error al iniciar sesión con Google: ' + err.message, 'error');
      }
      btn.disabled = false;
      btn.innerHTML = GOOGLE_BTN_HTML;
    }
  }
</script>
</body>
</html>
